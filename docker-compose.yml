version: '3.8'

services:
  # Основной сервис автопостинга
  vk-autoposter:
    build: .
    container_name: vk-autoposter
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    networks:
      - autoposter-network
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "scripts/health_check.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Локальная LLM для рерайта (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - autoposter-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Раскомментировать для GPU поддержки
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # Для ограничения памяти:
    # deploy:
    #   resources:
    #     reservations:
    #       memory: 2G

  # Telegram бот для модерации (опционально)
  telegram-bot:
    build: .
    container_name: telegram-moderator
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - MODE=telegram_bot
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - autoposter-network
    depends_on:
      - vk-autoposter
    profiles:
      - with-telegram

  # n8n для визуальных workflow (опционально)
  n8n:
    image: n8n/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - .env.n8n
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - autoposter-network
    profiles:
      - with-n8n

networks:
  autoposter-network:
    driver: bridge

volumes:
  ollama-data:
  n8n-data:
