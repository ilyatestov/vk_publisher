version: '3.8'

services:
  # ============================================
  # VK Publisher Application
  # ============================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE__URL=postgresql+asyncpg://postgres:password@db:5432/vk_publisher
      - VK__ACCESS_TOKEN=${VK_ACCESS_TOKEN}
      - VK__GROUP_ID=${VK_GROUP_ID}
      - TELEGRAM__TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM__MODERATOR_CHAT_ID=${ADMIN_TELEGRAM_ID}
      - OLLAMA__BASE_URL=http://ollama:11434
      - SECURITY__ENCRYPTION_KEY=${ENCRYPTION_KEY:-change_this_key_32_chars!}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./.env:/app/.env:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - vk_publisher_net

  # ============================================
  # PostgreSQL Database
  # ============================================
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vk_publisher
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - vk_publisher_net

  # ============================================
  # Redis (for caching and queues)
  # ============================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - vk_publisher_net

  # ============================================
  # Prometheus (metrics collection)
  # ============================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - vk_publisher_net

  # ============================================
  # Grafana (visualization)
  # ============================================
  grafana:
    image: grafana/grafana-enterprise
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    networks:
      - vk_publisher_net
    depends_on:
      - prometheus

  # ============================================
  # Ollama (local LLM server) - Optional
  # ============================================
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - vk_publisher_net
    profiles:
      - with-ollama

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  ollama_data:

networks:
  vk_publisher_net:
    driver: bridge
