name: 🐛 Сообщение об ошибке
description: Сообщите о найденной ошибке, чтобы мы могли её исправить
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за сообщение об ошибке! Пожалуйста, заполните эту форму максимально подробно.
        
        ⚠️ **Перед созданием issue:**
        - Проверьте, нет ли уже похожего отчёта (вкладка Issues)
        - Обновитесь до последней версии проекта
        - Попробуйте воспроизвести ошибку на чистом окружении

  - type: textarea
    id: description
    attributes:
      label: Описание ошибки
      description: Краткое и понятное описание проблемы
      placeholder: Например: При запуске бота возникает ошибка...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Шаги воспроизведения
      description: Подробные шаги для воспроизведения ошибки
      placeholder: |
        1. Запустить команду '...'
        2. Нажать кнопку '...'
        3. Увидеть ошибку
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
      description: Что должно было произойти?
      placeholder: Опишите, что вы ожидали увидеть
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение
      description: Что произошло на самом деле?
      placeholder: Опишите, что произошло вместо ожидаемого
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия проекта
      description: Какую версию вы используете? (можно узнать через `git log` или в README)
      placeholder: Например: 1.0.0
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Версия Python
      description: Какую версию Python вы используете? (`python --version`)
      placeholder: Например: 3.9.7
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Операционная система
      description: На какой ОС возникла проблема?
      options:
        - Windows
        - Linux
        - macOS
        - Docker
        - Другая
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Логи ошибок
      description: Скопируйте полный текст ошибки (если есть)
      placeholder: Вставьте логи между ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Дополнительная информация
      description: Любая другая информация, которая может помочь (скриншоты, конфигурация и т.д.)
      placeholder: Добавьте скриншоты, перетащив их в это поле
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Чеклист
      description: Подтвердите выполнение следующих условий
      options:
        - label: Я проверил существующие issues и не нашёл похожего
          required: true
        - label: Я обновился до последней версии проекта
          required: true
        - label: Я предоставил достаточно информации для воспроизведения ошибки
          required: true
