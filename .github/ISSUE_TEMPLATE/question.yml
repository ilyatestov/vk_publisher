name: ❓ Вопрос
description: Задайте вопрос по использованию проекта
title: "[Question]: "
labels: ["question", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Спасибо за вопрос! Пожалуйста, опишите его максимально подробно.
        
        ⚠️ **Перед созданием issue:**
        - Проверьте README и документацию
        - Посмотрите существующие issues, возможно на ваш вопрос уже ответили

  - type: textarea
    id: question
    attributes:
      label: Ваш вопрос
      description: Подробно опишите, что вы хотите узнать
      placeholder: Например: Как настроить...? Что означает...?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Контекст
      description: Опишите контекст вопроса (что вы делаете, какая цель и т.д.)
      placeholder: Я пытаюсь сделать..., но не понимаю...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Версия проекта
      description: Какую версию вы используете?
      placeholder: Например: 1.0.0
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Чеклист
      description: Подтвердите выполнение следующих условий
      options:
        - label: Я прочитал README и документацию
          required: true
        - label: Я проверил существующие issues
          required: true
        - label: Мой вопрос относится к этому проекту
          required: true
