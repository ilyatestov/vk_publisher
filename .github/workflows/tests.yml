name: Tests & Security

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  security-events: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with flake8
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Type check with mypy
      run: |
        mypy src/ --ignore-missing-imports --disallow-untyped-defs || true

    - name: Smoke import check
      run: |
        python -m py_compile src/main.py src/workers/pipeline.py src/core/config.py

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml || echo "Tests completed"

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit safety

    - name: Run Bandit (security linter)
      run: |
        bandit -r src -ll -f json -o bandit_report.json || true
        bandit -r src -ll

    - name: Run pip-audit (vulnerability scan)
      run: |
        pip-audit -r requirements.txt -f json -o pip_audit_report.json || true
        pip-audit -r requirements.txt

    - name: Run safety (dependency check)
      run: |
        safety check -r requirements.txt --json --output safety_report.json || true
        safety check -r requirements.txt

    - name: Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          bandit_report.json
          pip_audit_report.json
          safety_report.json
        retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: vk_publisher:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        docker run --rm vk_publisher:test python -c "import src.main; print('Docker image OK')"
