name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v2.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          bash scripts/release/build_linux.sh "${RELEASE_TAG}"

      - name: Build binary with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/release/build_windows.ps1 -Tag "${env:RELEASE_TAG}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vk-publisher-${{ runner.os }}
          path: |
            vk_publisher-${{ env.RELEASE_TAG }}-linux.tar.gz
            vk_publisher-${{ env.RELEASE_TAG }}-linux.tar.gz.sha256
            vk_publisher-${{ env.RELEASE_TAG }}-windows.zip
            vk_publisher-${{ env.RELEASE_TAG }}-windows.zip.sha256
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Validate tag format
        run: |
          if [[ ! "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]]; then
            echo "Invalid tag format: ${RELEASE_TAG}"
            echo "Expected format: vX.Y.Z (example: v2.1.0)"
            exit 1
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            artifacts/**/vk_publisher-${{ env.RELEASE_TAG }}-linux.tar.gz
            artifacts/**/vk_publisher-${{ env.RELEASE_TAG }}-linux.tar.gz.sha256
            artifacts/**/vk_publisher-${{ env.RELEASE_TAG }}-windows.zip
            artifacts/**/vk_publisher-${{ env.RELEASE_TAG }}-windows.zip.sha256
