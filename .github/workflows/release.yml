name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          bash scripts/release/build_linux.sh "${GITHUB_REF_NAME}"

      - name: Build binary with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./scripts/release/build_windows.ps1 -Tag "${env:GITHUB_REF_NAME}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vk-publisher-${{ runner.os }}
          path: |
            vk_publisher-${{ github.ref_name }}-linux.tar.gz
            vk_publisher-${{ github.ref_name }}-linux.tar.gz.sha256
            vk_publisher-${{ github.ref_name }}-windows.zip
            vk_publisher-${{ github.ref_name }}-windows.zip.sha256
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/vk_publisher-${{ github.ref_name }}-linux.tar.gz
            artifacts/**/vk_publisher-${{ github.ref_name }}-linux.tar.gz.sha256
            artifacts/**/vk_publisher-${{ github.ref_name }}-windows.zip
            artifacts/**/vk_publisher-${{ github.ref_name }}-windows.zip.sha256
