name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build binary with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --noconfirm --onefile --name vk_publisher-linux src/main.py
          mkdir -p dist/release
          cp dist/vk_publisher-linux dist/release/
          cp README.md dist/release/
          cp .env.example dist/release/.env.example || true
          cat > dist/release/start.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          "$DIR/vk_publisher-linux"
          EOF
          chmod +x dist/release/start.sh
          tar -czf vk_publisher-${GITHUB_REF_NAME}-linux.tar.gz -C dist/release .

      - name: Build binary with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --name vk_publisher-windows src/main.py
          New-Item -Path dist/release -ItemType Directory -Force | Out-Null
          Copy-Item dist/vk_publisher-windows.exe dist/release/
          Copy-Item README.md dist/release/
          if (Test-Path .env.example) { Copy-Item .env.example dist/release/.env.example }
          @"
          @echo off
          set SCRIPT_DIR=%~dp0
          "%SCRIPT_DIR%vk_publisher-windows.exe"
          "@ | Set-Content -Path dist/release/start.bat
          Compress-Archive -Path dist/release/* -DestinationPath vk_publisher-${env:GITHUB_REF_NAME}-windows.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vk-publisher-${{ runner.os }}
          path: |
            vk_publisher-${{ github.ref_name }}-linux.tar.gz
            vk_publisher-${{ github.ref_name }}-windows.zip
          if-no-files-found: ignore

  publish:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/vk_publisher-${{ github.ref_name }}-linux.tar.gz
            artifacts/**/vk_publisher-${{ github.ref_name }}-windows.zip
